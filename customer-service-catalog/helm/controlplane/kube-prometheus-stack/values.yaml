kube-prometheus-stack:
  global:
    imageRegistry: ""
  prometheusOperator:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: controlplane-prod
    prometheus:
      monitor:
        additionalLabels:
          monitoring.instance: controlplane-prod
  prometheus:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: controlplane-prod
    ingress:
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
      paths:
        - /prometheus
      pathType: ImplementationSpecific
      hosts:
        - controlplane-prod.172.18.255.254.traefik.me
      tls:
        - secretName: tls-prometheus
          hosts:
            - controlplane-prod.172.18.255.254.traefik.me


    prometheusSpec:
      retention: 10d
      serviceMonitorSelector:
        matchLabels:
          monitoring.instance: controlplane-prod
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
      externalUrl: https://controlplane-prod.172.18.255.254.traefik.me/prometheus
      routePrefix: /prometheus
    thanosServiceMonitor:
      serviceMonitor:
        additionalLabels:
          monitoring.instance: controlplane-prod
  alertmanager:
    serviceMonitor:
      additionalLabels:
        monitoring.instance: controlplane-prod
    ingress:
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
      paths:
        - /alertmanager
      pathType: ImplementationSpecific
      hosts:
        - controlplane-prod.172.18.255.254.traefik.me
      tls:
        - secretName: tls-alertmanager
          hosts:
            - controlplane-prod.172.18.255.254.traefik.me


# Below is an example alertmanager.config section:
